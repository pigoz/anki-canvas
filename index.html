<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>anki-canvas</title>
    <style>
      body { padding: 0; margin: 0; }
      nav { background: black; padding: 1rem; }
      nav a { color: white; margin-right: 1rem; }
      nav a.active { text-decoration: underline; }
      section { padding: 1rem; }
      .card {
        font-family: arial;
        font-size: 1.4rem;
        text-align: center;
        background-color: #fffaf0;
        color: #2a1b0a;
      }
      [data-view='front'] #ac-back,
      [data-view='back'] #ac-front { display: none; }
    </style>
  </head>
  <body>
    <nav>
      <a href="?view=all">All</a>
      <a href="?view=front">Front</a>
      <a href="?view=back">Back</a>
    </nav>
    <section class="card">
      <div id="ac-front"></div>
      <div id="ac-back"></div>
    </section>
    <script type="module">
      const view = new URLSearchParams(location.search).get('view') ?? 'all';
      document.body.dataset.view = view;
      for (const a of document.querySelectorAll('nav a')) {
        const href = new URL(a.href, location.href);
        if (href.searchParams.get('view') === view) a.classList.add('active');
      }
    </script>
    <script type="module" src="./src/front.ts"></script>
    <script type="module" src="./src/back.ts"></script>
  </body>
</html>
